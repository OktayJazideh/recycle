name: recycle_market
description: RecycleLink - A recycling marketplace connecting waste sellers with nearby collectors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  http: 1.5.0
  intl: ^0.20.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
